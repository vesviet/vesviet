<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TanhDev - Migrate to Cloudflare Pages</title>
    <!-- Use Tailwind CSS for a quick beautiful layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center relative overflow-hidden">
    
    <!-- Background Decor -->
    <div class="absolute top-0 -left-20 w-96 h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
    <div class="absolute top-0 -right-20 w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>
    <div class="absolute -bottom-32 left-1/2 w-96 h-96 bg-pink-600 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-4000"></div>

    <main class="glass-panel p-10 md:p-16 rounded-3xl max-w-2xl text-center z-10 mx-4">
        <!-- Logo/Avatar Placeholder -->
        <div class="w-24 h-24 mx-auto mb-6 rounded-2xl bg-gradient-to-br from-orange-400 to-red-500 flex items-center justify-center shadow-lg transform rotate-3 hover:rotate-0 transition-transform duration-300">
            <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
            </svg>
        </div>
        
        <h1 class="text-4xl md:text-5xl font-extrabold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-orange-400 to-orange-600">
            Welcome to TanhDev
        </h1>
        
        <p class="text-lg md:text-xl text-gray-300 mb-8 leading-relaxed">
            This is a blazing fast static page testing deployment with <strong>Cloudflare Pages</strong>. 
            Powered by Git CI/CD. Zero databases. Zero hassle.
        </p>

        <div class="flex flex-col sm:flex-row justify-center gap-4">
            <a href="#" class="px-8 py-3 rounded-full bg-orange-500 hover:bg-orange-600 text-white font-semibold transition-all shadow-[0_0_15px_rgba(249,115,22,0.5)] flex items-center justify-center">
                <span>Deploy Status: Success 🚀</span>
            </a>
        </div>
        
        <div class="mt-10 pt-6 border-t border-gray-700 text-sm text-gray-500">
            &copy; 2026 TanhDev. Hosted on the Global Edge Network.
        </div>
    </main>

</body>
</html>
