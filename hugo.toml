baseURL = "https://tanhdev.com/"
locale = "en-us"
title = "Lê Tuấn Anh — Go Backend Architect & Microservices Engineer"
theme = "PaperMod"
enableRobotsTXT = false  # static/robots.txt in /static takes precedence; explicit AI bot rules defined there
buildFuture = true

[params.assets]
favicon = "/favicon.ico"
apple_touch_icon = "/apple-touch-icon.png"
[pagination]
  pagerSize = 30

[markup]
  [markup.goldmark.renderer]
    unsafe = true


[permalinks]
  posts = "/posts/:slug/"
  radar = "/radar/:slug/"

[params]
  env = "production"
  images = ["/vesviet.png"]
  description = "Senior Go & Microservices Engineer with 17+ years building high-traffic e-commerce platforms. Deep dives on distributed systems, GitOps, Kubernetes, and AI."
  author = "Lê Tuấn Anh"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowToc = true
  TocOpen = true

[params.label]
  text = "Lê Tuấn Anh"


[params.cover]
  hidden = false           # show cover images
  hiddenInList = true      # hide on homepage / list pages — keep list clean
  hiddenInSingle = false   # show on individual post pages
  responsiveImages = true  # generate srcset for performance
  
[params.profileMode]
  enabled = true
  title = "Lê Tuấn Anh — Go Backend Architect & Distributed Systems Engineer"
  subtitle = """<span style="font-size: 1.1em;">**Backend Architecture & Platform Specialist**</span><br><br>17+ years building resilient, high-traffic platforms in Vietnam and beyond.<div class="exp-list"><div class="exp-item">🚀 **Monolith → 21 Go Microservices** (Zero Downtime Migration, Lotte Innovate)</div><div class="exp-item">⚡ **25M+ requests/month** at peak 8,000 RPS — p95 latency reduced from 1.2s → 120ms</div><div class="exp-item">⚙️ **GitOps at Scale** (Kubernetes EKS/K3s, ArgoCD, Dapr Pub/Sub, Saga Patterns)</div></div>"""
  imageUrl = "/vesviet.png"
  imageTitle = "Le Tuan Anh - Senior Software Engineer and Backend Architecture Specialist"
  imageWidth = 120
  imageHeight = 120
  
  [[params.profileMode.buttons]]
    name = "🤝 Hire Me / Consulting"
    url = "/hire/"
  [[params.profileMode.buttons]]
    name = "📧 Contact Me"
    url = "mailto:vesviet@gmail.com"
  [[params.profileMode.buttons]]
    name = "My Resume"
    url = "/Le-Tuan-Anh-Resume.pdf"
  [[params.profileMode.buttons]]
    name = "LinkedIn"
    url = "https://www.linkedin.com/in/vesviet"
  [[params.profileMode.buttons]]
    name = "GitHub"
    url = "https://github.com/vesviet"


[menu]
  [[menu.main]]
    identifier = "posts"
    name = "My Blog"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "series"
    name = "Series"
    url = "/series/"
    weight = 12
  [[menu.main]]
    identifier = "radar"
    name = "Tech Radar"
    url = "/radar/"
    weight = 15
  [[menu.main]]
    identifier = "about"
    name = "About Me"
    url = "/about/"
    weight = 20
  [[menu.main]]
    identifier = "hire"
    name = "Hire Me"
    url = "/hire/"
    weight = 25
  [[menu.main]]
    identifier = "external"
    name = "Resources"
    weight = 30
  [[menu.main]]
    parent = "external"
    identifier = "tools"
    name = "Dev Tools"
    url = "https://it-tools.tanhdev.com/"
    weight = 10
  [[menu.main]]
    parent = "external"
    identifier = "wiki"
    name = "Wiki"
    url = "https://wiki.tanhdev.com/"
    weight = 20

[outputs]
  home = ["HTML", "RSS"]
  page = ["HTML"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term = ["HTML"]
