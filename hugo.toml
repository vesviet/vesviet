baseURL = "https://tanhdev.com/"
languageCode = "en-us"
title = "Tuấn Anh - Senior Software Engineer"
theme = "PaperMod"
[pagination]
  pagerSize = 10

[markup]
  [markup.goldmark.renderer]
    unsafe = true


[permalinks]
  posts = "/posts/:slug/"

[params]
  env = "production"
  description = "A Senior Go & Microservices Developer Portfolio and Blog"
  author = "Tuấn Anh"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  
[params.profileMode]
  enabled = true
  title = "Le Tuan Anh"
  subtitle = """<span style="font-size: 1.1em;">**Senior Software Engineer · Backend Architecture & Platform Specialist**</span><br><br>17+ years of building resilient systems, migrating legacy monoliths to **Golang microservices**, and architecting high-traffic platforms.<br><br>Currently crafting a 21+ service e-commerce ecosystem using Go, Kubernetes, and Dapr. Passionate about Clean Architecture and Event-Driven Design."""
  imageUrl = "https://github.com/vesviet.png"
  imageWidth = 120
  imageHeight = 120
  
  [[params.profileMode.buttons]]
    name = "My Resume"
    url = "/Le-Tuan-Anh-Resume.pdf"
  [[params.profileMode.buttons]]
    name = "LinkedIn"
    url = "https://www.linkedin.com/in/vesviet"
  [[params.profileMode.buttons]]
    name = "GitHub"
    url = "https://github.com/vesviet"
  [[params.profileMode.buttons]]
    name = "Tech Blog"
    url = "/posts"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "My Blog"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "about"
    name = "About Me"
    url = "/about/"
    weight = 20
  [[menu.main]]
    identifier = "tools"
    name = "Dev Tools"
    url = "https://it-tools.tanhdev.com/"
    weight = 30
  [[menu.main]]
    identifier = "wiki"
    name = "Wiki"
    url = "https://wiki.tanhdev.com/"
    weight = 40
