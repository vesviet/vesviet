{{- $question := .Get "q" | default (.Get 0) -}}
{{- $answer := .Inner | markdownify -}}
<div class="faq-item" style="margin-bottom: 1.5rem;">
  <strong class="faq-question">{{ $question }}</strong>
  <div class="faq-answer" style="margin-top: 0.5rem;">{{ $answer }}</div>
</div>
{{- .Page.Store.Add "faqs" (slice (dict "question" $question "answer" ($answer | plainify))) -}}
