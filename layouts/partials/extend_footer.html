<style>
.mermaid-wrapper {
    position: relative;
    text-align: center;
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 10px;
    transition: background 0.2s;
    cursor: zoom-in;
}
.mermaid-wrapper:hover {
    background: var(--entry);
}
.mermaid-wrapper::after {
    content: "🔍 Click to Present Natively";
    position: absolute;
    bottom: 10px;
    right: 10px;
    font-size: 12px;
    background: var(--theme);
    color: var(--primary);
    padding: 6px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    opacity: 0.9;
    pointer-events: none;
}

/* Presentation Mode Customizations */
.mermaid-fullscreen {
    position: fixed !important;
    top: 0;
    left: 0;
    width: 100vw !important;
    height: 100vh !important;
    max-width: none !important;
    background: rgba(0, 0, 0, 0.95);
    z-index: 999999;
    padding: 0px !important;
    margin: 0 !important;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    cursor: default;
}
.mermaid-fullscreen::after {
    display: none; /* Hide the "Click to present" hint */
}
.mermaid-fullscreen svg {
    background: var(--theme) !important;
    width: 96vw !important;
    height: 96vh !important;
    border-radius: 8px;
    box-shadow: 0px 10px 40px rgba(0,0,0,0.8);
    cursor: grab;
}
.mermaid-fullscreen svg:active {
    cursor: grabbing;
}
.mermaid-close-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    font-size: 14px;
    font-weight: bold;
    color: white;
    background: #e74c3c;
    padding: 10px 20px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    z-index: 1000000;
    display: none; /* Hidden by default */
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
}
.mermaid-close-btn:hover {
    background: #c0392b;
}
</style>

<script type="module">
  document.addEventListener('DOMContentLoaded', () => {
    const blocks = document.querySelectorAll('pre code.language-mermaid, pre code[data-lang="mermaid"]');
    if (blocks.length === 0) return; // Skip on pages with no diagrams

    // Dynamically load svg-pan-zoom (UMD global) only when diagrams exist
    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    Promise.all([
      loadScript('https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js'),
      import('https://cdn.jsdelivr.net/npm/mermaid@10.9.3/dist/mermaid.esm.min.mjs')
    ]).then(([_, mermaidModule]) => {
        const mermaid = mermaidModule.default;

        // 1. Initial DOM setup (done once)
        blocks.forEach((block) => {
            const wrapper = document.createElement('div');
            wrapper.classList.add('mermaid-wrapper');
            
            const mermaidDiv = document.createElement('div');
            mermaidDiv.classList.add('mermaid');
            mermaidDiv.dataset.originalCode = block.textContent;
            mermaidDiv.textContent = block.textContent;
            wrapper.appendChild(mermaidDiv);
            
            // Construct the Close Button dynamically
            const closeBtn = document.createElement('button');
            closeBtn.className = 'mermaid-close-btn';
            closeBtn.textContent = '✖ Exit Presentation';
            wrapper.appendChild(closeBtn);
            
            // Attach event listeners ONCE
            closeBtn.addEventListener('click', (e) => {
                e.stopPropagation(); // prevent wrapper re-trigger
                wrapper.classList.remove('mermaid-fullscreen');
                document.body.style.overflow = '';
                closeBtn.style.display = 'none';
                if (wrapper.pz) {
                    wrapper.pz.disablePan();
                    wrapper.pz.disableZoom();
                    wrapper.pz.disableControlIcons();
                    wrapper.pz.resize();
                    wrapper.pz.fit();
                    wrapper.pz.center();
                }
            });
            
            wrapper.addEventListener('click', function(e) {
                const isFullscreen = this.classList.contains('mermaid-fullscreen');
                if (!isFullscreen) {
                    this.classList.add('mermaid-fullscreen');
                    document.body.style.overflow = 'hidden';
                    closeBtn.style.display = 'block';
                    
                    if (this.pz) {
                        this.pz.enablePan();
                        this.pz.enableZoom();
                        this.pz.enableControlIcons();
                        setTimeout(() => {
                            if (this.pz) {
                                this.pz.resize();
                                this.pz.fit();
                                this.pz.center();
                            }
                        }, 50);
                    }
                }
            });
            
            block.parentElement.replaceWith(wrapper);
        });
        
        // 2. Define the render/re-render logic
        function renderDiagrams() {
            const currentTheme = document.documentElement.dataset.theme || 'light';
            mermaid.initialize({ 
                startOnLoad: false,
                theme: currentTheme === 'dark' ? 'dark' : 'default'
            });
            
            // For each diagram: destroy pan-zoom, clear processed attribute, restore text content
            document.querySelectorAll('.mermaid').forEach((mermaidDiv) => {
                const wrapper = mermaidDiv.closest('.mermaid-wrapper');
                if (wrapper && wrapper.pz) {
                    wrapper.pz.destroy();
                    delete wrapper.pz;
                }
                mermaidDiv.removeAttribute('data-processed');
                mermaidDiv.textContent = mermaidDiv.dataset.originalCode;
            });
            
            return mermaid.run({
                querySelector: '.mermaid',
            }).then(() => {
                // Initialize svg-pan-zoom on newly generated SVGs
                document.querySelectorAll('.mermaid-wrapper').forEach((wrapper) => {
                    const svg = wrapper.querySelector('.mermaid svg');
                    if (!svg) return;
                    
                    const pz = svgPanZoom(svg, {
                        zoomEnabled: true,
                        controlIconsEnabled: true,
                        fit: true,
                        center: true,
                        minZoom: 0.1,
                        maxZoom: 20,
                        mouseWheelZoomEnabled: true
                    });
                    
                    wrapper.pz = pz;
                    
                    // Lock by default
                    pz.disablePan();
                    pz.disableZoom();
                    pz.disableControlIcons();
                    
                    // If already fullscreen, enable pan-zoom
                    if (wrapper.classList.contains('mermaid-fullscreen')) {
                        pz.enablePan();
                        pz.enableZoom();
                        pz.enableControlIcons();
                        pz.resize();
                        pz.fit();
                        pz.center();
                    }
                });
            }).catch((err) => {
                console.error('Mermaid render error:', err);
            });
        }
        
        // 3. Initial run
        renderDiagrams();
        
        // 4. Bind listener to #theme-toggle for dynamic theme re-rendering
        const themeToggle = document.getElementById('theme-toggle');
        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                // Wait for the theme state transition to complete on the <html> tag
                setTimeout(() => {
                    renderDiagrams();
                }, 50);
            });
        }
    });
  });
</script>

<script>
  // ── Pagefind Search + WebMCP searchSite ──────────────────────────────
  (function () {
    // ── State ──
    let pagefindLoaded = false;
    let pagefind = null;
    let debounceTimer = null;

    const modal    = document.getElementById('search-modal');
    const backdrop = document.getElementById('search-modal-backdrop');
    const input    = document.getElementById('search-input');
    const results  = document.getElementById('search-results');

    if (!modal || !input || !results) return; // Safety guard

    // ── Load Pagefind lazily (only when first needed) ──
    async function ensurePagefind() {
      if (pagefindLoaded) return pagefind;
      try {
        // Pagefind is built into /pagefind/pagefind.js by the CI build command
        pagefind = await import('/pagefind/pagefind.js');
        await pagefind.init();
        pagefindLoaded = true;
      } catch (e) {
        console.warn('[Search] Pagefind index not found. Run: npx pagefind --site public', e);
        pagefind = null;
      }
      return pagefind;
    }

    // ── Open / Close Modal ──
    function openModal() {
      modal.hidden = false;
      document.body.style.overflow = 'hidden';
      input.focus();
      ensurePagefind(); // pre-warm in background
    }

    function closeModal() {
      modal.hidden = true;
      document.body.style.overflow = '';
      input.value = '';
      results.innerHTML = '<p class="search-empty-hint">Start typing to search 100+ posts and series…</p>';
    }

    // ── Inject search trigger button into PaperMod header nav ──
    function injectSearchButton() {
      const nav = document.querySelector('#top-link') || document.querySelector('.nav');
      const headerEl = document.querySelector('header');
      if (!headerEl) return;

      const btn = document.createElement('button');
      btn.id = 'search-trigger';
      btn.className = 'search-trigger-btn';
      btn.setAttribute('aria-label', 'Search site (Ctrl+K)');
      btn.setAttribute('title', 'Search (Ctrl+K)');
      btn.innerHTML = `
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <span class="search-trigger-kbd" aria-hidden="true">⌘K</span>
      `;
      btn.addEventListener('click', openModal);

      // Inject into PaperMod header's nav links area
      const headerInner = headerEl.querySelector('.nav') || headerEl;
      headerInner.appendChild(btn);
    }

    // ── Render search results ──
    async function runSearch(query) {
      results.innerHTML = '';

      if (!query.trim()) {
        results.innerHTML = '<p class="search-empty-hint">Start typing to search 100+ posts and series…</p>';
        return;
      }

      const pf = await ensurePagefind();
      if (!pf) {
        results.innerHTML = '<p class="search-no-results">Search index not available. Please try again after the next deployment.</p>';
        return;
      }

      try {
        const search = await pf.search(query);
        const items  = await Promise.all(search.results.slice(0, 8).map(r => r.data()));

        if (items.length === 0) {
          results.innerHTML = `<p class="search-no-results">No results for "<strong>${escapeHtml(query)}</strong>" — try a shorter keyword.</p>`;
          return;
        }

        results.innerHTML = items.map(item => `
          <a href="${escapeHtml(item.url)}" class="search-result-item" tabindex="0">
            <p class="search-result-title">${escapeHtml(item.meta?.title || item.url)}</p>
            ${item.excerpt ? `<p class="search-result-excerpt">${item.excerpt}</p>` : ''}
            ${item.meta?.tags ? `
              <div class="search-result-meta">
                ${item.meta.tags.split(',').slice(0,4).map(t =>
                  `<span class="search-result-tag">${escapeHtml(t.trim())}</span>`
                ).join('')}
              </div>` : ''}
          </a>
        `).join('');

      } catch (err) {
        results.innerHTML = '<p class="search-no-results">Search error — please try again.</p>';
        console.error('[Search] Pagefind error:', err);
      }
    }

    // ── Escape HTML helper ──
    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Event Listeners ──
    input.addEventListener('input', function () {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => runSearch(this.value), 220);
    });

    backdrop.addEventListener('click', closeModal);

    document.addEventListener('keydown', function (e) {
      // Cmd/Ctrl + K — open search
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        modal.hidden ? openModal() : closeModal();
        return;
      }
      // ESC — close
      if (e.key === 'Escape' && !modal.hidden) {
        closeModal();
        return;
      }
      // Arrow navigation inside results
      if (!modal.hidden && (e.key === 'ArrowDown' || e.key === 'ArrowUp')) {
        e.preventDefault();
        const items = Array.from(results.querySelectorAll('.search-result-item'));
        if (!items.length) return;
        const focused = document.activeElement;
        const idx = items.indexOf(focused);
        if (e.key === 'ArrowDown') {
          (items[idx + 1] || items[0]).focus();
        } else {
          (items[idx - 1] || items[items.length - 1]).focus();
        }
      }
    });

    // ── Init on DOM ready ──
    document.addEventListener('DOMContentLoaded', injectSearchButton);

    // ── WebMCP: expose searchSite to AI agents ──
    if ('modelContext' in navigator) {
      navigator.modelContext.provideContext({
        tools: [
          {
            name: 'searchSite',
            description: 'Search tanhdev.com blog posts, series, and tech radar entries. Returns top results with title, URL, excerpt, and tags.',
            inputSchema: {
              type: 'object',
              properties: {
                query: {
                  type: 'string',
                  description: 'Search keyword or phrase (e.g. "goroutine leak", "magento migration", "dapr pub/sub")'
                }
              },
              required: ['query']
            },
            execute: async ({ query }) => {
              const pf = await ensurePagefind();
              if (!pf) {
                return {
                  content: [{
                    type: 'text',
                    text: 'Search index not available. The Pagefind index is generated at build time on Cloudflare Pages.'
                  }]
                };
              }
              try {
                const search = await pf.search(query);
                const items  = await Promise.all(
                  search.results.slice(0, 5).map(r => r.data())
                );
                if (items.length === 0) {
                  return { content: [{ type: 'text', text: `No results found for "${query}".` }] };
                }
                const structured = items.map(item => ({
                  title:   item.meta?.title || item.url,
                  url:     `https://tanhdev.com${item.url}`,
                  excerpt: item.excerpt ? item.excerpt.replace(/<[^>]+>/g, '') : '',
                  tags:    item.meta?.tags ? item.meta.tags.split(',').map(t => t.trim()) : []
                }));
                return {
                  content: [{
                    type: 'text',
                    text: JSON.stringify({ query, results: structured }, null, 2)
                  }]
                };
              } catch (err) {
                return { content: [{ type: 'text', text: `Search error: ${err.message}` }] };
              }
            }
          }
        ]
      });
    }
  })();
</script>
