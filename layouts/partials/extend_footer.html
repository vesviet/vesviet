<style>
.mermaid-wrapper {
    position: relative;
    text-align: center;
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 10px;
    transition: background 0.2s;
    cursor: zoom-in;
}
.mermaid-wrapper:hover {
    background: var(--entry);
}
.mermaid-wrapper::after {
    content: "🔍 Click to Present Natively";
    position: absolute;
    bottom: 10px;
    right: 10px;
    font-size: 12px;
    background: var(--theme);
    color: var(--primary);
    padding: 6px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    opacity: 0.9;
    pointer-events: none;
}

/* Presentation Mode Customizations */
.mermaid-fullscreen {
    position: fixed !important;
    top: 0;
    left: 0;
    width: 100vw !important;
    height: 100vh !important;
    max-width: none !important;
    background: rgba(0, 0, 0, 0.95);
    z-index: 999999;
    padding: 0px !important;
    margin: 0 !important;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    cursor: default;
}
.mermaid-fullscreen::after {
    display: none; /* Hide the "Click to present" hint */
}
.mermaid-fullscreen svg {
    background: var(--theme) !important;
    width: 96vw !important;
    height: 96vh !important;
    border-radius: 8px;
    box-shadow: 0px 10px 40px rgba(0,0,0,0.8);
    cursor: grab;
}
.mermaid-fullscreen svg:active {
    cursor: grabbing;
}
.mermaid-close-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    font-size: 14px;
    font-weight: bold;
    color: white;
    background: #e74c3c;
    padding: 10px 20px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    z-index: 1000000;
    display: none; /* Hidden by default */
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
}
.mermaid-close-btn:hover {
    background: #c0392b;
}
</style>

<!-- Load the industrial-grade SVG Pan Zoom library -->
<script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>

<script type="module">
  document.addEventListener('DOMContentLoaded', () => {
    const blocks = document.querySelectorAll('pre code.language-mermaid, pre code[data-lang="mermaid"]');
    if (blocks.length > 0) {
        import('https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs').then((mermaidModule) => {
            const mermaid = mermaidModule.default;
            mermaid.initialize({ 
                startOnLoad: false,
                theme: document.body.className.includes('dark') ? 'dark' : 'default'
            });
            
            blocks.forEach((block) => {
                const wrapper = document.createElement('div');
                wrapper.classList.add('mermaid');
                wrapper.classList.add('mermaid-wrapper');
                wrapper.textContent = block.textContent;
                
                // Construct the Close Button dynamically
                const closeBtn = document.createElement('button');
                closeBtn.className = 'mermaid-close-btn';
                closeBtn.textContent = '✖ Exit Presentation';
                wrapper.appendChild(closeBtn);
                
                block.parentElement.replaceWith(wrapper);
            });
            
            // Render Mermaid into SVGs natively
            mermaid.run({
              querySelector: '.mermaid',
            }).then(() => {
                document.querySelectorAll('.mermaid-wrapper').forEach((wrapper) => {
                    const svg = wrapper.querySelector('svg');
                    const closeBtn = wrapper.querySelector('.mermaid-close-btn');
                    
                    // Initialize svg-pan-zoom logic directly onto the Mermaid SVG output
                    const pz = svgPanZoom(svg, {
                        zoomEnabled: true,
                        controlIconsEnabled: true,
                        fit: true,
                        center: true,
                        minZoom: 0.1,
                        maxZoom: 20,
                        mouseWheelZoomEnabled: true
                    });
                    
                    wrapper.pz = pz; // cache the instance

                    // 1. By default, lock the graph so it acts like a normal image.
                    pz.disablePan();
                    pz.disableZoom();
                    pz.disableControlIcons();
                    
                    // 2. Intercept Exit click
                    closeBtn.addEventListener('click', (e) => {
                        e.stopPropagation(); // prevent wrapper re-trigger
                        wrapper.classList.remove('mermaid-fullscreen');
                        document.body.style.overflow = '';
                        closeBtn.style.display = 'none';
                        pz.disablePan();
                        pz.disableZoom();
                        pz.disableControlIcons();
                        pz.resize(); pz.fit(); pz.center();
                    });

                    // 3. Intercept Click to enter Presentation Mode
                    wrapper.addEventListener('click', function(e) {
                        const isFullscreen = this.classList.contains('mermaid-fullscreen');
                        // Prevent triggering if they are already in fullscreen (avoids interrupting panning)
                        if (!isFullscreen) {
                            this.classList.add('mermaid-fullscreen');
                            document.body.style.overflow = 'hidden'; // Stop background website scroll
                            closeBtn.style.display = 'block'; // Show bright red EXIT button
                            
                            // Unleash Mouse Wheel Zooming and Click-Dragging
                            this.pz.enablePan();
                            this.pz.enableZoom();
                            this.pz.enableControlIcons();
                            
                            // Instantly recalculate bounds for the huge screen overlay
                            setTimeout(() => {
                                this.pz.resize();
                                this.pz.fit();
                                this.pz.center();
                            }, 50);
                        }
                    });
                });
            });
        });
    }
  });
</script>
