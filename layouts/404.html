{{- define "main" -}}
<div class="not-found">
  <h1>404</h1>
  <h2>Page Not Found</h2>
  <p>The page you are looking for might have been moved, deleted, or never existed.</p>
  <a class="btn" href="{{ .Site.BaseURL }}">Back to Home</a>
</div>
<style>
  .not-found { text-align: center; padding: 100px 20px; }
  .not-found h1 { font-size: 8rem; margin: 0; color: var(--primary); }
  .not-found h2 { font-size: 2.5rem; margin-bottom: 20px; }
  .not-found p { font-size: 1.2rem; margin-bottom: 40px; color: var(--secondary); }
  .not-found .btn { display: inline-block; padding: 12px 24px; background: var(--primary); color: var(--theme); text-decoration: none; border-radius: 8px; font-weight: bold; transition: opacity 0.2s; }
  .not-found .btn:hover { opacity: 0.9; }
</style>
{{- end -}}
